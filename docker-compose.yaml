# Python Automation Docker Compose - Production Ready (2026)

services:
  automation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python_automation
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - automation-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

networks:
  automation-network:
    driver: bridge

volumes:
  output:
  logs:

# Usage:
# - Development: docker-compose up --build
# - Production: docker-compose -f docker-compose.yaml -f docker-compose.prod.yaml up --build